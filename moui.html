                { "id": 17, "question": "17. 개인은 무료로 사용할 수 있도록 승인되었지만, 기업이나 공공기관 등은 반드시 정당한 비용을 지불하고 사용해야 하는 라이선스는?", "options": ["① 오픈소스", "② 프리웨어", "③ 셰어웨어", "④ 상용 소프트웨어"], "answer": "2", "feedback": "정답: ② 프리웨어" },
                { "id": 18, "question": "18. 일정 기간(체험 기간) 동안 먼저 사용해 본 후, 마음에 들어 계속 사용하기를 원할 때 정식 비용을 지불하는 형태의 소프트웨어는?", "options": ["① 오픈소스", "② 프리웨어", "③ 셰어웨어", "④ 상용 소프트웨어"], "answer": "3", "feedback": "정답: ③ 셰어웨어" }
            ],
            "essay": [
                { "id": 19, "question": "주관식 1. 사이버 범죄를 안전하게 예방하기 위해 사용자가 컴퓨터나 스마트폰 시스템 환경에서 실천할 수 있는 구체적인 기술적 방안 2가지를 기술하시오.", "keywords": ["보안 패치", "백신", "실시간 감시"], "feedback": "정답 기준: 최신 보안 패치 및 실시간 백신 작동 기술" },
                { "id": 20, "question": "주관식 2. 살아 있는 개인에 관한 정보로 이름, 주소, 주민등록번호 등을 통해 특정 개인을 드러낼 수 있는 고유 정보를 뜻하는 핵심 용어를 쓰시오.", "keywords": ["개인 정보"], "feedback": "정답 기준: 개인 정보 기술" },
                { "id": 21, "question": "주관식 3. 저작권 보호 항목 중, 창작성이 인정되지 않아 법적으로 '보호받지 못하는 저작물'의 대표적인 실생활 사례 예시를 본문 기준에 맞추어 2가지 쓰시오.", "keywords": ["헌법", "법률", "판결문", "공식", "데이터 나열"], "feedback": "정답 기준: 법률, 판결문, 공식, 단순 데이터 등 포함" },
                { "id": 22, "question": "주관식 4. 비용을 정당하게 지불하고 프로그램이 가진 모든 기능의 사용 권리를 온전하게 취득하여 사용하는 일반적인 유료 소프트웨어 라이선스 명칭을 쓰시오.", "keywords": ["상용 소프트웨어"], "feedback": "정답 기준: 상용 소프트웨어 명시" }
            ]
        }
    };

    let activeExam = 1;

    // 회차 동적 바인딩 출력기
    function renderExam(num) {
        activeExam = num;
        document.getElementById('exam-title').innerText = `Part ${num}. 제 ${num}회 모의평가 문항지`;
        document.getElementById('score-board').style.display = "none";

        const currentChoice = dataSource[num].choice;
        const currentEssay = dataSource[num].essay;

        // 객관식 그리기
        let choiceHtml = "";
        currentChoice.forEach(q => {
            choiceHtml += `
                <div class="q-wrapper" data-qid="${q.id}" data-type="choice">
                    <p><strong>${q.question}</strong></p>
                    <ul class="options-route">
                        ${q.options.map((opt, idx) => `
                            <li><label><input type="radio" name="choice_${q.id}" value="${idx+1}"> ${opt}</label></li>
                        `).join('')}
                    </ul>
                    <div class="wrong-feedback">❌ 오답입니다. (${q.feedback})</div>
                    <div class="correct-feedback">✔ 정답입니다!</div>
                </div>
            `;
        });
        document.getElementById('choice-container').innerHTML = choiceHtml;

        // 주관식 그리기
        let essayHtml = "";
        currentEssay.forEach(q => {
            essayHtml += `
                <div class="q-wrapper" data-qid="${q.id}" data-type="essay">
                    <p><strong>${q.question}</strong></p>
                    <input type="text" class="input-essay" id="essay_${q.id}" placeholder="여기에 정답 및 서술 핵심 내용을 기입하세요.">
                    <div class="wrong-feedback">❌ 누락된 필수 기준 키워드가 있습니다. (${q.feedback})</div>
                    <div class="correct-feedback">✔ 정답 판정 (채점 기준 만족)</div>
                </div>
            `;
        });
        document.getElementById('essay-container').innerHTML = essayHtml;
    }

    // 탭 토글링 함수
    function switchExam(num) {
        document.querySelectorAll('.tab-btn').forEach((btn, idx) => {
            btn.classList.toggle('active', idx + 1 === num);
        });
        renderExam(num);
    }

    // 정밀 웹 자동 채점 모듈 (객관식 4점씩 72점 + 서술형 7점씩 28점 = 100점 만점 구조화)
    function evaluateExam() {
        const target = dataSource[activeExam];
        let scoreChoice = 0;
        let scoreEssay = 0;

        // 1. 객관식 채점
        target.choice.forEach(q => {
            const container = document.querySelector(`[data-type="choice"][data-qid="${q.id}"]`);
            const checkedNode = document.querySelector(`input[name="choice_${q.id}"]:checked`);
            
            if (checkedNode && checkedNode.value === q.answer) {
                container.querySelector('.correct-feedback').style.display = "block";
                container.querySelector('.wrong-feedback').style.display = "none";
                scoreChoice += 4;
            } else {
                container.querySelector('.wrong-feedback').style.display = "block";
                container.querySelector('.correct-feedback').style.display = "none";
            }
        });

        // 2. 주관식 채점 (키워드 서칭 매칭 기법)
        target.essay.forEach(q => {
            const container = document.querySelector(`[data-type="essay"][data-qid="${q.id}"]`);
            const value = document.getElementById(`essay_${q.id}`).value.trim();
            
            let pass = false;
            q.keywords.forEach(kw => {
                if (value.toLowerCase().includes(kw.toLowerCase())) {
                    pass = true;
                }
            });

            if (value !== "" && pass) {
                container.querySelector('.correct-feedback').style.display = "block";
                container.querySelector('.wrong-feedback').style.display = "none";
                scoreEssay += 7;
            } else {
                container.querySelector('.wrong-feedback').style.display = "block";
                container.querySelector('.correct-feedback').style.display = "none";
            }
        });

        const total = scoreChoice + scoreEssay;
        const board = document.getElementById('score-board');
        board.innerHTML = `취득 점수: 총 ${total}점 / 100점 (객관식: ${scoreChoice}점, 주관식: ${scoreEssay}점)`;
        board.style.display = "block";
        board.scrollIntoView({ behavior: 'smooth' });
    }

    // PDF 에러 완전 우회 해결: 브라우저 기본 최적화 인쇄 시스템 호출
    function triggerPrint() {
        window.print();
    }

    // 최초 창 진입 로드
    window.onload = function() {
        renderExam(1);
    };
</script>
</body>
</html>
