<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2026학년도 1학기 기말고사 대비 정보 모의고사 (1~3회)</title>
    <style>
        /* 기본 테마 및 디바이스 최적화 */
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --success-color: #2ecc71;
            --alert-color: #e74c3c;
            --bg-color: #f5f7fa;
            --box-bg: #ffffff;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Malgun Gothic', Dotum, sans-serif;
            line-height: 1.6;
            background-color: var(--bg-color);
            color: #333;
            margin: 0;
            padding: 10px;
            -webkit-text-size-adjust: none;
        }

        .container {
            max-width: 840px;
            margin: 0 auto;
            background: var(--box-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        h1 {
            text-align: center;
            color: var(--primary-color);
            font-size: 1.8rem;
            border-bottom: 3px double var(--accent-color);
            padding-bottom: 10px;
            margin-top: 5px;
        }

        /* 탭 내비게이션 */
        .tab-menu {
            display: flex;
            justify-content: space-around;
            margin-bottom: 25px;
            background: #eee;
            border-radius: 8px;
            padding: 5px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            text-align: center;
            background: none;
            border: none;
            font-size: 1rem;
            font-weight: bold;
            color: #666;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s ease;
        }

        .tab-btn.active {
            background: var(--primary-color);
            color: #fff;
        }

        /* 유틸리티 다운로드 영역 */
        .download-zone {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            background: #eef2f5;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .btn-dl {
            flex: 1;
            min-width: 140px;
            padding: 8px 12px;
            background: #7f8c8d;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            text-align: center;
        }

        .btn-dl:hover { background: #616a6b; }
        .btn-dl.ans-btn { background: #16a085; }
        .btn-dl.ans-btn:hover { background: #117a65; }

        /* 문제 레이아웃 */
        .section-title {
            background: var(--primary-color);
            color: white;
            padding: 8px 14px;
            font-size: 1.1rem;
            border-radius: 4px;
            margin-top: 30px;
        }

        .q-box {
            margin-bottom: 25px;
            padding: 15px;
            border-bottom: 1px solid #e0e0e0;
        }

        .q-text {
            font-weight: bold;
            font-size: 1.05rem;
            margin-bottom: 12px;
        }

        /* 보기 구성 */
        .options-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .options-list li {
            margin-bottom: 8px;
        }

        .options-list label {
            display: flex;
            align-items: center;
            padding: 10px;
            border: 1px solid #dcdde1;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .options-list label:hover {
            background: #f1f2f6;
        }

        .options-list input[type="radio"] {
            margin-right: 12px;
            width: 18px;
            height: 18px;
        }

        /* 서술형 입력 */
        .textarea-ans {
            width: 100%;
            height: 80px;
            box-sizing: border-box;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 0.95rem;
            resize: vertical;
        }

        .keyword-guide {
            font-size: 0.8rem;
            color: #7f8c8d;
            margin-top: 4px;
        }

        /* 채점 결과 스타일 */
        .action-zone {
            margin-top: 40px;
            text-align: center;
        }

        .btn-submit {
            width: 100%;
            max-width: 340px;
            padding: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
            background: #95a5a6;
            border: none;
            border-radius: 8px;
            cursor: not-allowed;
            transition: background 0.3s;
        }

        .btn-submit.ready {
            background: var(--accent-color);
            cursor: pointer;
        }

        .btn-submit.ready:hover {
            background: #2980b9;
        }

        .score-board {
            display: none;
            margin-top: 25px;
            padding: 20px;
            background: #e8f8f5;
            border: 2px solid var(--success-color);
            border-radius: 8px;
            text-align: center;
        }

        .wrong-feedback {
            color: var(--alert-color);
            font-weight: bold;
            margin-top: 8px;
            display: none;
        }

        .correct-feedback {
            color: var(--success-color);
            font-weight: bold;
            margin-top: 8px;
            display: none;
        }

        @media (max-width: 600px) {
            body { padding: 5px; }
            .container { padding: 12px; border-radius: 0; }
            h1 { font-size: 1.4rem; }
            .tab-btn { padding: 8px; font-size: 0.9rem; }
            .q-text { font-size: 0.95rem; }
            .options-list label { padding: 8px; font-size: 0.9rem; }
        }

        /* PDF 인쇄 및 저장 최적화 스타일 */
        @media print {
            body { background: white; color: black; padding: 0; }
            .tab-menu, .download-zone, .action-zone, .score-board, .wrong-feedback, .correct-feedback { display: none !important; }
            .container { box-shadow: none; max-width: 100%; padding: 0; }
            .q-box { page-break-inside: avoid; }
            .textarea-ans { border: 1px solid #000; height: 120px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1 id="exam-title">1학기 기말고사 정보 모의고사</h1>
    
    <div class="tab-menu">
        <button class="tab-btn active" onclick="switchTab(1)">제 1회 모의고사</button>
        <button class="tab-btn" onclick="switchTab(2)">제 2회 모의고사</button>
        <button class="tab-btn" onclick="switchTab(3)">제 3회 모의고사</button>
    </div>

    <div class="download-zone">
        <button class="btn-dl" onclick="downloadTxt(currentExam, 'question')">현재 회차 문제지 텍스트 다운로드</button>
        <button class="btn-dl ans-btn" onclick="downloadTxt(currentExam, 'answer')">현재 회차 정답지 텍스트 다운로드</button>
        <button class="btn-dl" onclick="printPDF()">현재 화면 인쇄 / PDF 저장</button>
    </div>

    <form id="exam-form" oninput="checkFormCompletion()">
        <div id="choice-section"></div>
        <div id="essay-section"></div>
        
        <div class="action-zone">
            <button type="button" id="btn-submit" class="btn-submit" onclick="gradeExam()" disabled>모든 문항을 입력해 주세요</button>
        </div>
    </form>
    
    <div id="score-board" class="score-board"></div>
</div>

<script>
    // 전체 시험 데이터 정의 (1회, 2회, 3회 보존 및 확장)
    const examData = {
        1: [
            {
                id: 1,
                type: "choice",
                question: "다음 중 우리가 처리하고자 하는 목적 과제를 컴퓨터를 활용하여 일련의 데이터 처리 및 가공 과정을 거치는 개념을 가장 적절하게 정의한 단어는 무엇인가?",
                options: ["피지컬 시스템", "알고리즘 설계", "컴퓨팅", "소프트웨어 가속화"],
                answer: 3,
                feedback: "컴퓨팅"
            },
            {
                id: 2,
                type: "choice",
                question: "하드웨어 장치 중 성격이 다른 하나를 고르시오.",
                options: ["키보드", "마우스", "스피커", "터치스크린"],
                answer: 3,
                feedback: "스피커 - 출력장치이며 나머지는 입력 기능 포함"
            },
            {
                id: 3,
                type: "choice",
                question: "다음 하드웨어 종류와 역할의 연결 중 잘못된 것은?",
                options: [
                    "통신 장치 - 다른 컴퓨팅 시스템과 데이터를 송수신한다.",
                    "처리 장치 - 데이터와 응용 프로그램을 영구 저장한다.",
                    "출력 장치 - 처리된 연산 결과를 사용자에게 시각/청각 등으로 전달한다.",
                    "입력 장치 - 외부 환경 데이터나 명령을 시스템에 전달한다."
                ],
                answer: 2,
                feedback: "처리 장치 - 저장 기능이 아니라 연산 및 제어가 주 임무입니다."
            },
            {
                id: 4,
                type: "choice",
                question: "다음 중 [윈도(Windows), macOS, iOS, 안드로이드]가 공통으로 속하는 소프트웨어 분류 유형은?",
                options: ["응용 소프트웨어", "시스템 소프트웨어", "오픈소스 패키지", "셰어웨어 프로그램"],
                answer: 2,
                feedback: "시스템 소프트웨어"
            },
            {
                id: 19,
                type: "essay",
                question: "서술형 1. 시스템 소프트웨어의 핵심인 '운영체제(OS)'가 수행하는 실질적인 주요 관리 자원 및 핵심 기능에 대하여 상세히 설명하시오.",
                keywords: ["하드웨어", "제어", "사용자 인터페이스", "시스템 자원", "효율적 관리"]
            },
            {
                id: 20,
                type: "essay",
                question: "서술형 2. 피지컬 컴퓨팅의 작동 구조를 입력, 처리, 출력 단계의 상호작용 메커니즘을 엮어서 서술하시오.",
                keywords: ["센서", "감지", "마이크로컨트롤러", "연산", "액추에이터"]
            }
        ],
        2: [
            {
                id: 1,
                type: "choice",
                question: "컴퓨팅 시스템을 지탱하는 두 가지 양대 축 중 물리적 형체가 없어 만질 수 없으나 하드웨어 작동을 전담하는 명령어의 집합체 구조는?",
                options: ["펌웨어 칩셋", "하드웨어 섀시", "소프트웨어", "통신 매체 인터페이스"],
                answer: 3,
                feedback: "소프트웨어"
            }
        ],
        3: [
            {
                id: 1,
                type: "choice",
                question: "제 3회 모의고사 테스트 문항입니다.",
                options: ["보기 1", "보기 2", "보기 3", "보기 4"],
                answer: 1,
                feedback: "보기 1"
            }
        ]
    };

    let currentExam = 1;

    window.onload = function() {
        renderExam(currentExam);
    };

    function switchTab(examNum) {
        currentExam = examNum;
        document.querySelectorAll('.tab-btn').forEach((btn, idx) => {
            btn.classList.toggle('active', idx === (examNum - 1));
        });
        
        document.getElementById('score-board').style.display = 'none';
        renderExam(examNum);
    }

    // 문제를 화면에 동적으로 렌더링하는 함수
    function renderExam(examNum) {
        const questions = examData[examNum] || [];
        const choiceSection = document.getElementById('choice-section');
        const essaySection = document.getElementById('essay-section');
        
        choiceSection.innerHTML = '<div class="section-title">선택형 문항</div>';
        essaySection.innerHTML = '<div class="section-title">서술형 문항</div>';
        
        let hasChoice = false;
        let hasEssay = false;

        const numMap = ["", "①", "②", "③", "④", "⑤"];

        questions.forEach(q => {
            if (q.type === 'choice') {
                hasChoice = true;
                let optionsHtml = '';
                q.options.forEach((opt, idx) => {
                    optionsHtml += `
                        <li>
                            <label>
                                <input type="radio" name="q_${q.id}" value="${idx + 1}" onchange="checkFormCompletion()"> 
                                ${numMap[idx + 1]} ${opt}
                            </label>
                        </li>
                    `;
                });

                choiceSection.innerHTML += `
                    <div class="q-box" data-qid="${q.id}" data-type="choice">
                        <div class="q-text">${q.id}. ${q.question}</div>
                        <ul class="options-list">${optionsHtml}</ul>
                        <div class="wrong-feedback">❌ 오답 (정답: ${numMap[q.answer]} | 해설: ${q.feedback})</div>
                        <div class="correct-feedback">✔ 정답입니다!</div>
                    </div>
                `;
            } else if (q.type === 'essay') {
                hasEssay = true;
                let kwText = q.keywords.join(', ');
                essaySection.innerHTML += `
                    <div class="q-box" data-qid="${q.id}" data-type="essay">
                        <div class="q-text">${q.id}. ${q.question}</div>
                        <textarea class="textarea-ans" placeholder="답안을 입력하세요." oninput="checkFormCompletion()"></textarea>
                        <div class="keyword-guide">💡 포함 필수 키워드: ${kwText}</div>
                        <div class="wrong-feedback">❌ 키워드가 부족합니다. (필수 단어: ${kwText})</div>
                        <div class="correct-feedback">✔ 정답 기준 만족 (핵심 키워드 포함 확인)</div>
                    </div>
                `;
            }
        });

        if(!hasChoice) choiceSection.style.display = 'none';
        else choiceSection.style.display = 'block';
        
        if(!hasEssay) essaySection.style.display = 'none';
        else essaySection.style.display = 'block';

        checkFormCompletion();
    }

    // 양식 입력 완결성 체크 함수
    function checkFormCompletion() {
        const questions = examData[currentExam] || [];
        let allAnswered = true;

        questions.forEach(q => {
            if (q.type === 'choice') {
                const radioGroup = document.getElementsByName(`q_${q.id}`);
                let checked = false;
                for (let i = 0; i < radioGroup.length; i++) {
                    if (radioGroup[i].checked) { checked = true; break; }
                }
                if (!checked) allAnswered = false;
            } else if (q.type === 'essay') {
                const qBox = document.querySelector(`.q-box[data-qid="${q.id}"][data-type="essay"]`);
                if (qBox) {
                    const textVal = qBox.querySelector('.textarea-ans').value.trim();
                    if (textVal === "") allAnswered = false;
                }
            }
        });

        const btnSubmit = document.getElementById('btn-submit');
        if (allAnswered && questions.length > 0) {
            btnSubmit.className = "btn-submit ready";
            btnSubmit.innerText = "시험지 채점 및 피드백 받기";
            btnSubmit.disabled = false;
        } else {
            btnSubmit.className = "btn-submit";
            btnSubmit.innerText = "모든 문항을 입력해 주세요";
            btnSubmit.disabled = true;
        }
    }

    // 채점 프로세스 제어 함수
    function gradeExam() {
        const questions = examData[currentExam] || [];
        let score_choice = 0;
        let score_essay = 0;
        
        let total_choice_cnt = questions.filter(q => q.type === 'choice').length;
        let total_essay_cnt = questions.filter(q => q.type === 'essay').length;
        
        let pointsPerChoice = total_choice_cnt > 0 ? (60 / total_choice_cnt) : 0;
        let pointsPerEssay = total_essay_cnt > 0 ? (40 / total_essay_cnt) : 0;

        questions.forEach(q => {
            const qBox = document.querySelector(`.q-box[data-qid="${q.id}"]`);
            if (!qBox) return;

            const wrongFeed = qBox.querySelector('.wrong-feedback');
            const correctFeed = qBox.querySelector('.correct-feedback');

            wrongFeed.style.display = 'none';
            correctFeed.style.display = 'none';

            if (q.type === 'choice') {
                const radioGroup = document.getElementsByName(`q_${q.id}`);
                let selectedAns = -1;
                for (let i = 0; i < radioGroup.length; i++) {
                    if (radioGroup[i].checked) { selectedAns = parseInt(radioGroup[i].value); break; }
                }

                if (selectedAns === q.answer) {
                    score_choice += pointsPerChoice;
                    correctFeed.style.display = 'block';
                } else {
                    wrongFeed.style.display = 'block';
                }
            } else if (q.type === 'essay') {
                const textVal = qBox.querySelector('.textarea-ans').value.trim();
                let matchCount = 0;
                
                q.keywords.forEach(kw => {
                    if (textVal.includes(kw)) { matchCount++; }
                });

                // 키워드가 전부 매칭되어야 정답 처리 (기준에 맞춰 수정 가능)
                if (matchCount === q.keywords.length) {
                    score_essay += pointsPerEssay;
                    correctFeed.style.display = 'block';
                } else {
                    wrongFeed.style.display = 'block';
                }
            }
        });

        score_choice = Math.round(score_choice);
        score_essay = Math.round(score_essay);
        let finalScore = score_choice + score_essay;

        const scoreBoard = document.getElementById('score-board');
        scoreBoard.innerHTML = `
            <p style="font-size:1.4rem; font-weight:bold; color:#16a085;">
                최종 취득 점수: ${finalScore} 점 / 100점
            </p>
            <p>(선택형: ${score_choice}점, 서술형 키워드 매칭: ${score_essay}점)</p>
            <p style="color:#7f8c8d; font-size:0.9rem;">틀린 문제는 위 본문에서 적색 피드백 창으로 정답 해설을 확인할 수 있습니다.</p>
        `;
        scoreBoard.style.display = "block";
        scoreBoard.scrollIntoView({ behavior: 'smooth' });
    }

    // 텍스트 기반 다운로드 파일 빌더 모듈
    function downloadTxt(examNum, mode) {
        const questions = examData[examNum] || [];
        const numMap = ["", "①", "②", "③", "④", "⑤"];
        let output = "";

        if (mode === 'question') {
            output += `==================================================\n`;
            output += `    2026학년도 1학기 정보 기말고사 모의평가 제 ${examNum}회 문제지\n`;
            output += `==================================================\n\n`;

            questions.forEach(q => {
                output += `${q.id}. ${q.question}\n`;
                if (q.type === 'choice') {
                    q.options.forEach((opt, idx) => {
                        output += `  ${numMap[idx + 1]} ${opt}\n`;
                    });
                } else if (q.type === 'essay') {
                    output += `  [답안 작성란]\n\n\n`;
                }
                output += `\n`;
            });
        } else if (mode === 'answer') {
            output += `==================================================\n`;
            output += `    2026학년도 1학기 정보 기말고사 모의평가 제 ${examNum}회 정답지\n`;
            output += `==================================================\n\n`;

            output += `[정답 및 해설 리스트]\n`;
            questions.forEach(q => {
                if (q.type === 'choice') {
                    output += `▶ ${q.id}번 정답: ${numMap[q.answer]} | 해설: ${q.feedback}\n`;
                } else if (q.type === 'essay') {
                    output += `▶ ${q.id}번 필수 채점 키워드: ${q.keywords.join(', ')}\n`;
                }
            });
        }

        const blob = new Blob([output], { type: "text/plain;charset=utf-8" });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = mode === 'question' ? `정보_모의고사_제${examNum}회_문제지.txt` : `정보_모의고사_제${examNum}회_정답지.txt`;
        link.click();
    }

    // 브라우저 기본 인쇄 및 PDF 저장 유틸 기능
    function printPDF() {
        window.print();
    }
</script>
</body>
</html>
