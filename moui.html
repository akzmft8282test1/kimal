<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2026학년도 1학기 기말고사 대비 정보 모의고사</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --success-color: #2ecc71;
            --alert-color: #e74c3c;
            --bg-color: #f5f7fa;
            --box-bg: #ffffff;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Malgun Gothic', Dotum, sans-serif;
            line-height: 1.6;
            background-color: var(--bg-color);
            color: #333;
            margin: 0;
            padding: 10px;
        }

        .container {
            max-width: 840px;
            margin: 0 auto;
            background: var(--box-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        h1 {
            text-align: center;
            color: var(--primary-color);
            font-size: 1.8rem;
            border-bottom: 3px double var(--accent-color);
            padding-bottom: 10px;
        }

        .tab-menu {
            display: flex;
            justify-content: space-around;
            margin-bottom: 25px;
            background: #eee;
            border-radius: 8px;
            padding: 5px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            text-align: center;
            background: none;
            border: none;
            font-size: 1rem;
            font-weight: bold;
            color: #666;
            cursor: pointer;
            border-radius: 6px;
        }

        .tab-btn.active {
            background: var(--primary-color);
            color: #fff;
        }

        .download-zone {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            background: #eef2f5;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .btn-dl {
            flex: 1;
            min-width: 140px;
            padding: 8px 12px;
            background: #7f8c8d;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            text-align: center;
        }

        .btn-dl:hover { background: #616a6b; }

        .section-title {
            background: var(--primary-color);
            color: white;
            padding: 8px 14px;
            font-size: 1.1rem;
            border-radius: 4px;
            margin-top: 30px;
        }

        .q-box {
            margin-bottom: 25px;
            padding: 15px;
            border-bottom: 1px solid #e0e0e0;
        }

        .q-text {
            font-weight: bold;
            font-size: 1.05rem;
            margin-bottom: 12px;
        }

        .options-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .options-list li {
            margin-bottom: 8px;
        }

        .options-list label {
            display: flex;
            align-items: center;
            padding: 10px;
            border: 1px solid #dcdde1;
            border-radius: 6px;
            cursor: pointer;
        }

        .options-list input[type="radio"] {
            margin-right: 12px;
            width: 18px;
            height: 18px;
        }

        .textarea-ans {
            width: 100%;
            height: 80px;
            box-sizing: border-box;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 0.95rem;
        }

        .keyword-guide {
            font-size: 0.8rem;
            color: #7f8c8d;
            margin-top: 4px;
        }

        .wrong-feedback { color: var(--alert-color); font-weight: bold; margin-top: 8px; display: none; }
        .correct-feedback { color: var(--success-color); font-weight: bold; margin-top: 8px; display: none; }

        .action-zone {
            margin-top: 40px;
            text-align: center;
        }

        .btn-submit {
            width: 100%;
            max-width: 340px;
            padding: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
            background: var(--accent-color);
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .score-board {
            display: none;
            margin-top: 25px;
            padding: 20px;
            background: #e8f8f5;
            border: 2px solid var(--success-color);
            border-radius: 8px;
            text-align: center;
        }

        @media print {
            .tab-menu, .download-zone, .action-zone, .score-board { display: none !important; }
            .container { box-shadow: none; max-width: 100%; padding: 0; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>1학기 기말고사 정보 모의고사</h1>
    
    <div class="tab-menu">
        <button class="tab-btn active" onclick="switchTab(1)">제 1회 모의고사</button>
        <button class="tab-btn" onclick="switchTab(2)">제 2회 모의고사</button>
        <button class="tab-btn" onclick="switchTab(3)">제 3회 모의고사</button>
    </div>

    <div class="download-zone">
        <button class="btn-dl" onclick="printExam()">📄 현재 회차 문제지 인쇄 / PDF 저장</button>
    </div>

    <form id="exam-form">
        <div id="choice-section"></div>
        <div id="essay-section"></div>
        
        <div class="action-zone">
            <button type="button" class="btn-submit" onclick="gradeExam()">정답 및 키워드 채점하기</button>
        </div>
    </form>

    <div id="score-board" class="score-board"></div>
</div>

<script>
    // 임시 내부 JSON 데이터 저장소 (추후 외부 fetch 데이터로 쉽게 대체 가능)
    const examData = {
        "1": {
            "choice": [
                {
                    "id": 1,
                    "type": "선택형",
                    "question": "1. 다음 중 우리가 처리하고자 하는 목적 과제를 컴퓨터를 활용하여 일련의 데이터 처리 및 가공 과정을 거치는 개념을 가장 적절하게 정의한 단어는 무엇인가?",
                    "options": ["① 피지컬 시스템", "② 알고리즘 설계", "③ 컴퓨팅", "④ 소프트웨어 가속화"],
                    "answer": "3",
                    "feedback": "정답: ③ 컴퓨팅"
                },
                {
                    "id": 2,
                    "type": "선택형",
                    "question": "2. 하드웨어 장치 중 성격이 다른 하나를 고르시오.",
                    "options": ["① 키보드", "② 마우스", "③ 스피커", "④ 터치스크린"],
                    "answer": "3",
                    "feedback": "정답: ③ 스피커 - 출력장치이며 나머지는 입력 기능 포함"
                }
            ],
            "essay": [
                {
                    "id": 19,
                    "type": "서술형",
                    "question": "서술형 1. 시스템 소프트웨어의 핵심인 '운영체제(OS)'가 수행하는 실질적인 주요 관리 자원 및 핵심 기능에 대하여 상세히 설명하시오.",
                    "keywords": ["하드웨어", "제어", "사용자 인터페이스", "시스템 자원", "효율적 관리"],
                    "feedback": "필수 단어: 하드웨어, 제어, 사용자 인터페이스, 시스템 자원, 효율적 관리"
                }
            ]
        },
        "2": { "choice": [], "essay": [] },
        "3": { "choice": [], "essay": [] }
    };

    let currentExam = 1;

    // 회차 로드 및 화면 바인딩 함수
    function loadExam(examNum) {
        currentExam = examNum;
        const data = examData[examNum];
        
        const choiceSection = document.getElementById('choice-section');
        const essaySection = document.getElementById('essay-section');
        document.getElementById('score-board').style.display = 'none';

        // 1. 선택형 문항 빌드
        if(data.choice.length > 0) {
            let html = `<div class="section-title">선택형 문항</div>`;
            data.choice.forEach(q => {
                html += `
                    <div class="q-box" data-q="${q.id}">
                        <div class="q-text">${q.question}</div>
                        <ul class="options-list">
                            ${q.options.map((opt, idx) => `
                                <li><label><input type="radio" name="q_${q.id}" value="${idx+1}"> ${opt}</label></li>
                            `).join('')}
                        </ul>
                        <div class="wrong-feedback">❌ 오답 (${q.feedback})</div>
                        <div class="correct-feedback">✔ 정답입니다!</div>
                    </div>`;
            });
            choiceSection.innerHTML = html;
        } else {
            choiceSection.innerHTML = '<div class="q-box">준비 중인 회차입니다.</div>';
        }

        // 2. 서술형 문항 빌드
        if(data.essay.length > 0) {
            let html = `<div class="section-title">서술형 문항</div>`;
            data.essay.forEach(q => {
                html += `
                    <div class="q-box" data-q="${q.id}">
                        <div class="q-text">${q.question}</div>
                        <textarea class="textarea-ans" id="ans_${q.id}" placeholder="답안을 입력하세요."></textarea>
                        <div class="keyword-guide">💡 포함 필수 키워드: ${q.keywords.join(', ')}</div>
                        <div class="wrong-feedback">❌ 키워드가 부족합니다. (${q.feedback})</div>
                        <div class="correct-feedback">✔ 정답 기준 만족 (핵심 키워드 포함 확인)</div>
                    </div>`;
            });
            essaySection.innerHTML = html;
        } else {
            essaySection.innerHTML = '';
        }
    }

    // 탭 전환 기능
    function switchTab(examNum) {
        document.querySelectorAll('.tab-btn').forEach((btn, idx) => {
            btn.classList.toggle('active', idx + 1 === examNum);
        });
        loadExam(examNum);
    }

    // 채점 프로세스
    function gradeExam() {
        const data = examData[currentExam];
        let score = 0;

        // 선택형 채점
        data.choice.forEach(q => {
            const qBox = document.querySelector(`[data-q="${q.id}"]`);
            const selected = document.querySelector(`input[name="q_${q.id}"]:checked`);
            
            if(selected && selected.value === q.answer) {
                qBox.querySelector('.correct-feedback').style.display = 'block';
                qBox.querySelector('.wrong-feedback').style.display = 'none';
                score += 20; // 문항 배점 임의 계산
            } else {
                qBox.querySelector('.wrong-feedback').style.display = 'block';
                qBox.querySelector('.correct-feedback').style.display = 'none';
            }
        });

        // 서술형 키워드 매칭 채점
        data.essay.forEach(q => {
            const qBox = document.querySelector(`[data-q="${q.id}"]`);
            const userAns = document.getElementById(`ans_${q.id}`).value;
            
            let matchCount = 0;
            q.keywords.forEach(kw => {
                if(userAns.includes(kw)) matchCount++;
            });

            if(matchCount >= 3) { // 3개 이상 포함 시 정답 처리 조건 예시
                qBox.querySelector('.correct-feedback').style.display = 'block';
                qBox.querySelector('.wrong-feedback').style.display = 'none';
                score += 20;
            } else {
                qBox.querySelector('.wrong-feedback').style.display = 'block';
                qBox.querySelector('.correct-feedback').style.display = 'none';
            }
        });

        const sb = document.getElementById('score-board');
        sb.innerHTML = `<h3>최종 점수: ${score}점</h3>`;
        sb.style.display = 'block';
    }

    // PDF 에러 우회 해결책: 안전한 시스템 브라우저 기본 프린팅 출력 변환
    function printExam() {
        window.print();
    }

    // 초기 화면 실행 시 1회차 자동 로드
    window.onload = function() {
        loadExam(1);
    };
</script>
</body>
</html>
