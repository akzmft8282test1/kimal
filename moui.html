<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2026학년도 1학기 기말고사 대비 정보 모의고사</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --success-color: #2ecc71;
            --alert-color: #e74c3c;
            --bg-color: #f5f7fa;
            --box-bg: #ffffff;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Malgun Gothic', sans-serif; line-height: 1.6; background-color: var(--bg-color); color: #333; margin: 0; padding: 10px; }
        .container { max-width: 840px; margin: 0 auto; background: var(--box-bg); padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h1 { text-align: center; color: var(--primary-color); font-size: 1.6rem; margin-bottom: 20px; }
        .tabs { display: flex; gap: 5px; margin-bottom: 20px; border-bottom: 2px solid var(--primary-color); padding-bottom: 5px; }
        .tab-btn { flex: 1; padding: 12px; border: none; background: #e2e8f0; font-weight: bold; cursor: pointer; border-radius: 6px 6px 0 0; font-size: 0.95rem; }
        .tab-btn.active { background: var(--primary-color); color: white; }
        .exam-section { display: none; }
        .exam-section.active { display: block; }
        .q-box { background: #fff; border: 1px solid #e2e8f0; padding: 15px; margin-bottom: 15px; border-radius: 8px; }
        .q-title { font-weight: bold; font-size: 1.05rem; margin-bottom: 10px; color: #2c3e50; }
        .option-list { list-style: none; padding: 0; margin: 0; }
        .option-list li { margin-bottom: 8px; }
        .option-list label { display: flex; align-items: center; gap: 8px; background: #f8fafc; padding: 10px; border: 1px solid #e2e8f0; border-radius: 6px; cursor: pointer; transition: 0.2s; }
        .option-list label:hover { background: #edf2f7; }
        .essay-input { width: 100%; height: 80px; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 0.95rem; resize: none; box-sizing: border-box; }
        .feedback { display: none; margin-top: 10px; padding: 10px; border-radius: 6px; font-size: 0.9rem; font-weight: bold; }
        .feedback.wrong { display: block; background: #fde8e8; color: var(--alert-color); border: 1px solid #f8b4b4; }
        .feedback.correct { display: block; background: #def7ec; color: var(--success-color); border: 1px solid #b3f5d4; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .btn { padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 1rem; text-align: center; text-decoration: none; }
        .btn-submit { background: var(--accent-color); color: white; grid-column: span 2; }
        .btn-pdf { background: #718096; color: white; }
        .btn-ans { background: #e74c3c; color: white; }
        #score-board { display: none; background: #ebf8ff; border: 1px solid #bee3f8; padding: 15px; border-radius: 8px; margin-top: 20px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h1>📝 정보 과목 기말고사 실전 모의평가</h1>
    
    <div class="tabs">
        <button class="tab-btn active" onclick="switchExam('1')">제 1회 모의고사</button>
        <button class="tab-btn" onclick="switchExam('2')">제 2회 모의고사</button>
        <button class="tab-btn" onclick="switchExam('3')">제 3회 모의고사</button>
    </div>

    <form id="exam-form">
        <div id="questions-container">
            <p style="text-align:center; color:#718096;">데이터를 불러오는 중입니다...</p>
        </div>
        
        <div id="score-board"></div>

        <div class="btn-group">
            <button type="button" class="btn btn-submit" onclick="gradeExam()">✏️ 모의고사 결과 채점 및 피드백 받기</button>
            <button type="button" class="btn btn-pdf" onclick="generateServerPDF('question')">📄 현재 회차 문제지 (PDF)</button>
            <button type="button" class="btn btn-ans" onclick="generateServerPDF('answer')">✨ 현재 회차 정답지 (PDF)</button>
        </div>
    </form>
</div>

<script>
    let examData = {};
    let currentExam = '1';

    // 1. 페이지 로드 시 백엔드로부터 최신 JSON 데이터 원격 확보
    document.addEventListener("DOMContentLoaded", () => {
        fetch('/api/exam-data')
            .then(res => res.json())
            .then(data => {
                examData = data;
                renderQuestions();
            })
            .catch(err => {
                document.getElementById("questions-container").innerHTML = 
                    `<p style="color:red; text-align:center;">시험 데이터를 불러오지 못했습니다. 서버 상태를 확인하세요.</p>`;
            });
    });

    // 2. 탭 전환 처리
    function switchExam(num) {
        currentExam = num;
        document.querySelectorAll('.tab-btn').forEach((btn, idx) => {
            btn.classList.toggle('active', (idx + 1).toString() === num);
        });
        document.getElementById('score-board').style.display = 'none';
        renderQuestions();
    }

    // 3. 데이터를 기반으로 UI 컴포넌트 생성 바인딩
    function renderQuestions() {
        const container = document.getElementById("questions-container");
        const activeData = examData[currentExam];
        if (!activeData) return;

        let html = '';

        // 선택형 가로 채우기
        if (activeData.choice) {
            html += `<h2 style="color:var(--primary-color); border-bottom:2px solid #edf2f7; padding-bottom:5px;">I. 선택형 객관식 문항</h2>`;
            activeData.choice.forEach(q => {
                let optionsHtml = '';
                q.options.forEach((opt, oIdx) => {
                    optionsHtml += `
                        <li>
                            <label>
                                <input type="radio" name="q_${q.id}" value="${oIdx + 1}">
                                ${opt}
                            </label>
                        </li>`;
                });
                html += `
                    <div class="q-box" data-id="${q.id}" data-type="choice" data-ans="${q.answer}">
                        <div class="q-title">${q.question}</div>
                        <ul class="option-list">${optionsHtml}</ul>
                        <div class="feedback" id="fb_${q.id}">${q.feedback}</div>
                    </div>`;
            });
        }

        // 서술형 주입
        if (activeData.essay) {
            html += `<h2 style="color:var(--primary-color); border-bottom:2px solid #edf2f7; padding-bottom:5px; margin-top:30px;">II. 서술형 주관식 문항</h2>`;
            activeData.essay.forEach(q => {
                html += `
                    <div class="q-box" data-id="${q.id}" data-type="essay" data-kws='${JSON.stringify(q.keywords || [])}'>
                        <div class="q-title">${q.question}</div>
                        <textarea class="essay-input" name="q_${q.id}" placeholder="여기에 정답 서술형 문장을 채워주세요. (자동 키워드 채점 시스템 반영)"></textarea>
                        <div class="feedback" id="fb_${q.id}">[핵심 인정 키워드]: ${q.keywords ? q.keywords.join(', ') : ''} | ${q.feedback || ''}</div>
                    </div>`;
            });
        }

        container.innerHTML = html;
    }

    // 4. 동적 클라이언트 채점기 엔진
    function gradeExam() {
        const qBoxes = document.querySelectorAll('.q-box');
        let scoreChoice = 0;
        let scoreEssay = 0;
        let countChoice = 0;
        let countEssay = 0;

        qBoxes.forEach(box => {
            const id = box.dataset.id;
            const type = box.dataset.type;
            const fbBox = document.getElementById(`fb_${id}`);
            fbBox.className = "feedback"; // 초기화

            if (type === 'choice') {
                countChoice++;
                const selected = document.querySelector(`input[name="q_${id}"]:checked`);
                const userAns = selected ? selected.value : "";
                const correctAns = box.dataset.ans;

                if (userAns === correctAns) {
                    scoreChoice++;
                    fbBox.classList.add('correct');
                } else {
                    fbBox.classList.add('wrong');
                }
            } else if (type === 'essay') {
                countEssay++;
                const userText = document.querySelector(`textarea[name="q_${id}"]`).value.trim();
                const keywords = JSON.parse(box.dataset.kws || "[]");
                
                // 키워드가 1개라도 일치하면 부분점수 또는 정답 인정 매칭 알고리즘
                let matched = keywords.filter(kw => userText.includes(kw));
                if (userText.length > 2 && matched.length > 0) {
                    scoreEssay++;
                    fbBox.classList.add('correct');
                } else {
                    fbBox.classList.add('wrong');
                }
            }
        });

        // 100점 만점 환산 비율 시스템
        const totalQuestions = countChoice + countEssay;
        const totalCorrect = scoreChoice + scoreEssay;
        const finalScore = Math.round((totalCorrect / totalQuestions) * 100);

        const board = document.getElementById('score-board');
        board.innerHTML = `
            <h3 style="margin:0; color:#2b6cb0;">💯 채점 완료 결과 보고서</h3>
            <p style="font-size:1.3rem; font-weight:bold; margin:10px 0;">최종 점수: ${finalScore} 점 / 100점</p>
            <p style="font-size:0.9rem; color:#4a5568;">(선택형 맞춤: ${scoreChoice}/${countChoice} | 서술형 인정: ${scoreEssay}/${countEssay})</p>
            <small style="color:#718096;">*하단 적색 피드백 항목과 키워드를 분석하여 복습 활동지를 완성해 보세요!</small>
        `;
        board.style.display = 'block';
        board.scrollIntoView({ behavior: 'smooth' });
    }

    // 5. 서버에 POST로 안전하게 세션 다운로드 호출 요청
    function generateServerPDF(type) {
        const btn = event.currentTarget;
        const originText = btn.innerText;
        btn.innerText = "PDF 빌드 중...";
        btn.disabled = true;

        fetch(`/download/${type}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ examNum: currentExam })
        })
        .then(res => {
            if (!res.ok) throw new Error("서버 PDF 렌더링에 실패했습니다.");
            return res.blob();
        })
        .then(blob => {
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `정보_모의고사_제${currentExam}회_${type === 'question' ? '문제지' : '정답지'}.pdf`;
            document.body.appendChild(a);
            a.click();
            a.remove();
        })
        .catch(err => alert(err.message))
        .finally(() => {
            btn.innerText = originText;
            btn.disabled = false;
        });
    }
</script>

</body>
</html>
