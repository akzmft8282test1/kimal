<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>정보 모의평가 PDF 다운로드 센터</title>
    <style>
        /* [사이트 기본 UI/CSS 테마 그대로 계승] */
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --success-color: #2ecc71;
            --alert-color: #e74c3c;
            --bg-color: #f5f7fa;
            --box-bg: #ffffff;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Malgun Gothic', sans-serif;
            line-height: 1.6;
            background-color: var(--bg-color);
            color: #333;
            margin: 0;
            padding: 40px 20px;
        }
        .download-container {
            max-width: 800px;
            margin: 0 auto;
            background: var(--box-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h1 { text-align: center; color: var(--primary-color); font-size: 1.8rem; margin-bottom: 5px; }
        .subtitle { text-align: center; color: #7f8c8d; margin-bottom: 30px; font-size: 0.95rem; }
        
        .exam-card {
            background: #fafbfc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .exam-info h3 { margin: 0 0 5px 0; color: var(--primary-color); }
        .exam-info p { margin: 0; color: #718096; font-size: 0.85rem; }
        .btn-group { display: flex; gap: 10px; }
        .btn { padding: 10px 16px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 0.9rem; text-decoration: none; }
        .btn-q { background: var(--accent-color); color: white; }
        .btn-a { background: var(--alert-color); color: white; }

        /* ==================================================
           [🖨 인쇄 출력 컴파일용 전용 템플릿 영역 (화면엔 숨김)]
           ================================================== */
        #print-zone { display: none; }

        @media print {
            body { background: #fff; padding: 0; margin: 0; color: #000; }
            .download-container { display: none !important; } /* 관리창 숨김 */
            #print-zone { display: block !important; } /* 프린트 데이터만 활성화 */
            
            /* 사이트 본래 문제지 CSS 무드 재현 */
            .print-page { padding: 20px; font-size: 14px; page-break-after: always; }
            .pdf-header { border-bottom: 3px solid #2c3e50; padding-bottom: 10px; margin-bottom: 20px; text-align: center; }
            .pdf-header.ans { border-bottom-color: #e74c3c; }
            .pdf-title { font-size: 20px; font-weight: bold; color: #2c3e50; margin: 0; }
            .pdf-title.ans { color: #e74c3c; }
            .info-box { background: #f8fafc !important; border: 1px solid #e2e8f0 !important; border-radius: 6px; padding: 10px; margin-bottom: 20px; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .section-title { font-size: 16px; font-weight: bold; color: #3498db; margin: 25px 0 10px 0; border-left: 4px solid #3498db; padding-left: 8px; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .section-title.ans { color: #e74c3c; border-left-color: #e74c3c; }
            .q-box { background: #fff; border: 1px solid #e2e8f0; padding: 12px; margin-bottom: 12px; border-radius: 6px; page-break-inside: avoid; }
            .q-title { font-weight: bold; margin-bottom: 8px; }
            .opt-list { list-style: none; padding-left: 5px; margin: 5px 0; }
            .opt-list li { margin-bottom: 4px; }
            .essay-space { border: 1px solid #cbd5e1; min-height: 80px; margin-top: 8px; border-radius: 4px; }
            
            /* 정답 표 스타일 */
            table { width: 100%; border-collapse: collapse; margin-top: 15px; }
            th, td { border: 1px solid #cbd5e1; padding: 8px; text-align: center; }
            th { background: #f1f5f9 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .ans-text { color: #e74c3c; font-weight: bold; }
            .feedback-box { background: #fdf8f8 !important; border: 1px solid #f8b4b4 !important; padding: 8px; margin-top: 5px; border-radius: 4px; font-size: 12px; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        }
    </style>
</head>
<body>

<div class="download-container">
    <h1>📄 모의고사 PDF 인쇄 및 다운로드 센터</h1>
    <div class="subtitle">사이트 UI와 동일한 품질로 1회, 2회, 3회 시험지/답지를 출력할 수 있습니다.</div>

    <div class="exam-card">
        <div class="exam-info">
            <h3>제 1회 정보 모의평가</h3>
            <p>선택형 및 서술형 문항 세트 수록</p>
        </div>
        <div class="btn-group">
            <button class="btn btn-q" onclick="compileAndPrint('1', 'question')">문제지 다운로드</button>
            <button class="btn btn-a" onclick="compileAndPrint('1', 'answer')">정답지 다운로드</button>
        </div>
    </div>

    <div class="exam-card">
        <div class="exam-info">
            <h3>제 2회 정보 모의평가</h3>
            <p>네트워크 및 저작권, 라이선스 영역 수록</p>
        </div>
        <div class="btn-group">
            <button class="btn btn-q" onclick="compileAndPrint('2', 'question')">문제지 다운로드</button>
            <button class="btn btn-a" onclick="compileAndPrint('2', 'answer')">정답지 다운로드</button>
        </div>
    </div>

    <div class="exam-card">
        <div class="exam-info">
            <h3>제 3회 정보 모의평가</h3>
            <p>1학기 정보 교육과정 전 범위 최종 점검</p>
        </div>
        <div class="btn-group">
            <button class="btn btn-q" onclick="compileAndPrint('3', 'question')">문제지 다운로드</button>
            <button class="btn btn-a" onclick="compileAndPrint('3', 'answer')">정답지 다운로드</button>
        </div>
    </div>
</div>

<div id="print-zone"></div>

<script>
    // 페이지 진입 즉시 백엔드 데이터 동적 확보
    let examData = {};
    fetch('/api/exam-data')
        .then(res => res.json())
        .then(data => { examData = data; })
        .catch(err => console.error("데이터 로딩 오류:", err));

    function compileAndPrint(examNum, type) {
        if (!examData[examNum]) {
            alert("시험 데이터를 아직 불러오지 못했습니다. 잠시 후 다시 시도해 주세요.");
            return;
        }

        const target = examData[examNum];
        const printZone = document.getElementById("print-zone");
        const isQ = (type === 'question');
        
        let html = '';
        
        // 1. 헤더 조립
        html += `
            <div class="print-page">
                <div class="pdf-header ${isQ ? '' : 'ans'}">
                    <h1 class="pdf-title ${isQ ? '' : 'ans'}">📝 2026학년도 1학기 정보과 기말대비 모의평가 (제 ${examNum}회 ${isQ ? '문제지' : '정답 해설지'})</h1>
                </div>
        `;

        if (isQ) {
            html += `<div class="info-box"><strong>학년/반/번호:</strong> 2학년 _____반 _____번 &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; <strong>이름:</strong> _________________</div>`;
            
            // 문제지 - 선택형 문항 주입
            html += `<div class="section-title">I. 선택형 문항</div>`;
            target.choice.forEach(q => {
                const opts = q.options.map(o => `<li>${o}</li>`).join('');
                html += `
                    <div class="q-box">
                        <div class="q-title">${q.id}. ${q.question}</div>
                        <ul class="opt-list">${opts}</ul>
                    </div>`;
            });

            // 문제지 - 서술형 문항 주입
            html += `<div class="section-title">II. 서술형 문항</div>`;
            target.essay.forEach(q => {
                html += `
                    <div class="q-box">
                        <div class="q-title">${q.id}. ${q.question}</div>
                        <div class="essay-space"></div>
                    </div>`;
            });

        } else {
            // 정답지 - 선택형 정답 표 컴파일
            html += `<div class="section-title ans">I. 선택형 정답 목록</div>`;
            html += `<table><thead><tr><th style="width:15%">번호</th><th style="width:20%">정답</th><th style="width:65%">문항 해설</th></tr></thead><tbody>`;
            
            target.choice.forEach(q => {
                html += `
                    <tr>
                        <td><strong>${q.id}</strong></td>
                        <td class="ans-text">${q.answer}번</td>
                        <td style="text-align:left;">${q.feedback || '정답 참고'}</td>
                    </tr>`;
            });
            html += `</tbody></table>`;

            // 정답지 - 서술형 기준 표 컴파일
            html += `<div class="section-title ans" style="margin-top:30px;">II. 서술형 문항 정답 및 채점 가이드라인</div>`;
            target.essay.forEach(q => {
                const kw = q.keywords ? q.keywords.join(', ') : '전체 요약 부합';
                html += `
                    <div class="q-box">
                        <div class="q-title">${q.id}. ${q.question}</div>
                        <div class="feedback-box">
                            <span class="ans-text">[핵심인정 키워드]:</span> <strong>${kw}</strong><br>
                            <span style="color:#555;">💡 해설 가이드: ${q.feedback || '출제 기준 참조'}</span>
                        </div>
                    </div>`;
            });
        }

        html += `</div>`;
        
        // 프린트 존에 데이터 밀어넣고 인쇄 윈도우 실행
        printZone.innerHTML = html;
        window.print();
    }
</script>

</body>
</html>
